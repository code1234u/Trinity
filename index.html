<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinity Social Management</title>
    <style>
        /* Base styles for a full-screen black canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Loading spinner container */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
        }

        /* Blue animated circle loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #161b22; 
            border-top: 5px solid #58a6ff; 
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Target content (initially hidden) */
        .content {
            display: none;
            width: 100%;
            height: 100%;
            color: white;
            text-align: center;
            padding-top: 40px; /* Gives space from the very top */
            box-sizing: border-box;
        }

        /* Big, bold title formatting */
        .header-title {
            font-size: 48px;
            font-weight: 800; /* Extra bold */
            letter-spacing: -1px;
            margin-bottom: 12px;
            text-transform: uppercase; /* Makes "TRINITY" stand out */
        }

        /* Smaller description text formatting */
        .description-text {
            font-size: 16px;
            font-weight: 400;
            color: #8b949e; /* Muted gray for secondary text style */
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.5;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="loader-container" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="content" id="main-content">
        <div class="header-title">trinity</div>
        <div class="description-text">
            We help individuals and brands grow. People and companies pay us to expert-manage and run their social media presence.
        </div>
    </div>

    <script>
        // Wait 5000 milliseconds (5 seconds) before switching screens
        setTimeout(() => {
            // Hide the loader
            document.getElementById('loader').style.display = 'none';
            
            // Show the main content with the big title and description
            document.getElementById('main-content').style.display = 'block';
        }, 5000);
    </script>

</body>
</html>
